apiVersion: v1
kind: Pod
metadata:
  name: init-demo
spec:
  initContainers:
    - name: write-config
      image: busybox:1.36
      command:
        - sh
        - -c
        - mkdir -p /work/config && echo color=blue > /work/config/app.conf
      volumeMounts:
        - name: shared
          mountPath: /work/config
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - cat /work/config/app.conf && sleep 3600
      volumeMounts:
        - name: shared
          mountPath: /work/config
  volumes:
    - name: shared
      emptyDir: {}

