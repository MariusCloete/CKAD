apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-web
  template:
    metadata:
      labels:
        app: ingress-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80

