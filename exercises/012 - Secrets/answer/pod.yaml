apiVersion: v1
kind: Pod
metadata:
  name: secret-consumer
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          echo "DB: $DB_URL"
          echo "API: $API_KEY"
          sleep 3600
      env:
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: database_url
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: api_key
