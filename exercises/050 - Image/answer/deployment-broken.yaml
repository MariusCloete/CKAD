apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bad-web
  template:
    metadata:
      labels:
        app: bad-web
    spec:
      containers:
        - name: web
          image: nginx:9.99
          ports:
            - containerPort: 80

