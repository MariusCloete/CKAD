apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-clusterip
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-clusterip
  template:
    metadata:
      labels:
        app: web-clusterip
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80

