apiVersion: apps/v1
kind: Deployment
metadata:
  name: selector-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selector-demo
  template:
    metadata:
      labels:
        app: selector-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80

