apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-rollout
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: web-rollout
  template:
    metadata:
      labels:
        app: web-rollout
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - containerPort: 80

