apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
labels:
  - pairs:
      env: staging
    includeSelectors: true
    includeTemplates: true
images:
  - name: nginx
    newTag: "1.27.1"
patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          owner: platform-team

