apiVersion: v1
kind: Pod
metadata:
  name: sidecar-log-pod
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - while true; do date >> /var/log/app.log; sleep 5; done
      volumeMounts:
        - name: logs
          mountPath: /var/log
    - name: log-reader
      image: busybox:1.36
      command:
        - sh
        - -c
        - tail -f /var/log/app.log
      volumeMounts:
        - name: logs
          mountPath: /var/log
  volumes:
    - name: logs
      emptyDir: {}

