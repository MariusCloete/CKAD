apiVersion: v1
kind: Pod
metadata:
  name: cache-pod
  namespace: default
spec:
  containers:
    - name: main
      image: busybox:1.36
      command:
        - sh
        - -c
        - echo ok > /cache/health.txt && sleep 3600
      volumeMounts:
        - name: cache
          mountPath: /cache
  volumes:
    - name: cache
      emptyDir:
        medium: Memory
