apiVersion: v1
kind: Pod
metadata:
  name: test-pd
spec:
  containers:
    - image: busybox:1.36
      name: test-container
      command: ["/bin/sh"]
      args: ["-c", "while true; do echo 'Hello, World!' > /cache/index.html; sleep 3600; done"]
      volumeMounts:
        - mountPath: /cache
          name: cache-volume
  volumes:
    - name: cache-volume
      emptyDir:
        medium: Memory