apiVersion: v1
kind: Pod
metadata:
  name: slow-start-pod
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - sleep 15 && touch /tmp/started && touch /tmp/ready && sleep 3600
      startupProbe:
        exec:
          command:
            - sh
            - -c
            - test -f /tmp/started
        failureThreshold: 20
        periodSeconds: 2
      readinessProbe:
        exec:
          command:
            - sh
            - -c
            - test -f /tmp/ready
        periodSeconds: 5

