apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-data-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-data
  template:
    metadata:
      labels:
        app: web-data
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          volumeMounts:
            - name: web-data
              mountPath: /usr/share/nginx/html
      volumes:
        - name: web-data
          persistentVolumeClaim:
            claimName: web-data-pvc

