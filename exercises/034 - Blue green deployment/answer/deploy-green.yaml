apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shop
      version: green
  template:
    metadata:
      labels:
        app: shop
        version: green
    spec:
      containers:
        - name: web
          image: nginx:1.27.1
          ports:
            - containerPort: 80

